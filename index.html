<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Clave Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0b0d; --card: #161618; --accent: #ff0000; --text: #fff; --text-dim: #9ca3af; --border: rgba(255,255,255,0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; min-height: 100vh; }
        .glow { position: fixed; top: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% -10%, #300000, transparent 60%); z-index: -1; }
        nav { padding: 25px; border-bottom: 1px solid var(--border); text-align: center; font-family: Montserrat; font-weight: 900; font-size: 1.5rem; }
        nav span { color: var(--accent); }
        header { padding: 80px 20px 40px; text-align: center; }
        header h1 { font-family: 'Montserrat'; font-weight: 900; font-size: 3.5rem; line-height: 1.1; margin-bottom: 20px; text-transform: uppercase; }
        header h1 .red { color: var(--accent); }
        header p { color: var(--text-dim); font-size: 1.3rem; margin-bottom: 40px; }
        .search-container { max-width: 650px; margin: 0 auto 60px; position: relative; }
        .search-container input { width: 100%; padding: 22px 30px; background: var(--card); border: 1px solid var(--border); border-radius: 18px; color: #fff; font-size: 1.2rem; outline: none; }
        .container { max-width: 1300px; margin: 0 auto; padding: 0 20px 100px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 30px; transition: 0.4s; }
        .card h3 { font-size: 1.3rem; margin-bottom: 15px; font-weight: 700; color: #fff; }
        .btn { background: var(--accent); color: #fff; text-align: center; padding: 14px; border-radius: 12px; font-weight: 800; font-size: 1rem; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="glow"></div>
    <nav>LA CLAVE <span>ACADEMY</span></nav>
    <header>
        <h1>EL MOTOR DE<br><span class="red">EDUCACIÓN ÉLITE</span></h1>
        <p>Más de 65,000 cursos certificados sin costo.</p>
        <div class="search-container">
            <input type="text" placeholder="¿Qué quieres dominar hoy?">
        </div>
    </header>
    <div class="container"><div id="grid" class="grid"></div></div>
    <script>
        const initial = [{titulo:"Inteligencia Artificial Pro"},{titulo:"Ciberseguridad"},{titulo:"Desarrollo Web Fullstack"}];
        document.getElementById('grid').innerHTML = initial.map(c=>`<div class="card"><h3>${c.titulo}</h3><div class="btn">ACCEDER AHORA</div></div>`).join('');
    </script>
</body>
</html>
