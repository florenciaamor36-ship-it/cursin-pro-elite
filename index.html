            const grid = document.getElementById('grid'), overlay = document.getElementById('status-overlay');
            overlay.style.display = 'flex';
            try {
                const res = await fetch('courses.json');
                const allData = await res.json();
                
                let data = allData;
                const query = document.getElementById('q').value.trim().toLowerCase();
                if (query || aC || aP) {
                    data = allData.filter(c => {
                        const t = c.titulo.toLowerCase(), d = (c.descripcion || '').toLowerCase(), p = c.plataforma.toLowerCase();
                        const matchQuery = !query || t.includes(query) || d.includes(query);
                        const matchCat = !aC || t.includes(aC.toLowerCase()) || d.includes(aC.toLowerCase());
                        const matchPlat = !aP || p.includes(aP.toLowerCase());
                        return matchQuery && matchCat && matchPlat;
                    });
                }
                totalItems = data.length;
                const paginatedData = data.slice((page-1)*limit, page*limit);
                grid.innerHTML = '';
                paginatedData.forEach(c => {
                    const isYT = c.plataforma.toLowerCase().includes('youtube');
                    const img = isYT ? 'https://raw.githubusercontent.com/florenciaamor36-ship-it/cursin-v2-oficial/main/youtube_fallback.jpg' : (c.imagen_url || 'https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=600');
                    let logo = 'https://cdn-icons-png.flaticon.com/512/3429/3429141.png';
                    for(let k in LOGOS) { if(c.plataforma.toLowerCase().includes(k)) logo = LOGOS[k]; }
                    let d = (c.descripcion || '').replace(/<[^>]*>?/gm, '').replace(/\\n/g, ' ').replace(/\\/g, '').trim();
                    grid.innerHTML += `<a class="card" href="${c.url}" target="_blank"><div class="c-img"><img class="main" src="${img}"><div class="c-logo"><img src="${logo}"></div></div><div class="c-body"><h3>${c.titulo}</h3><p class="c-desc">${d || 'Certificación oficial.'}</p><div class="c-plat">${c.plataforma}</div><div class="btn-go">Ir al Curso</div></div></a>`;
                });
                renderPagi();
            } catch (e) { console.error(e); grid.innerHTML = "<p style='text-align:center;padding:20px;'>Error al cargar cursos. Reintentando...</p>"; }
            overlay.style.display = 'none';
        }
        function renderPagi() {
            const container = document.getElementById('pagination'); container.innerHTML = '';
            const tP = Math.ceil(totalItems / limit); if(tP <= 1) return;
            for(let i = Math.max(1, page-1); i <= Math.min(tP, page+1); i++) {
                const b = document.createElement('button'); b.className = `p-btn ${i === page ? 'active' : ''}`;
                b.innerText = i; b.onclick = () => { page = i; load(); window.scrollTo(0,0); };
                container.appendChild(b);
            }
        }
        document.getElementById('q').oninput = () => { page = 1; clearTimeout(window.t); window.t = setTimeout(load, 600); };
        load();
    </script>
